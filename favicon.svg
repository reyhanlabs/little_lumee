<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A2460"/>
      <stop offset="100%" stop-color="#0D0B1E"/>
    </radialGradient>
    <linearGradient id="bulb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00E5C3"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#00E5C3" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#bulb)" stroke-width="1.5" opacity="0.6"/>

  <!-- Bulb upper dome -->
  <path d="M 32 10
           C 21 10, 14 18, 14 27
           C 14 34, 18 40, 24 43
           L 24 47
           L 40 47
           L 40 43
           C 46 40, 50 34, 50 27
           C 50 18, 43 10, 32 10 Z"
        fill="url(#glow)" filter="url(#softglow)" opacity="0.92"/>

  <!-- Base stripes -->
  <rect x="24" y="47" width="16" height="3.5" rx="1" fill="url(#bulb)" opacity="0.9"/>
  <rect x="25.5" y="51.5" width="13" height="3" rx="1" fill="url(#bulb)" opacity="0.75"/>
  <rect x="27" y="55.5" width="10" height="2.5" rx="1" fill="url(#bulb)" opacity="0.55"/>

  <!-- Inner glow center -->
  <ellipse cx="32" cy="28" rx="8" ry="9" fill="#ffffff" opacity="0.25"/>

  <!-- Filament -->
  <path d="M 32 36 L 28 30 L 36 30 L 32 24" 
        fill="none" stroke="url(#bulb)" stroke-width="1.8" 
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Sparkle dots -->
  <circle cx="12" cy="16" r="1.8" fill="#6C63FF" opacity="0.7"/>
  <circle cx="52" cy="16" r="1.8" fill="#00E5C3" opacity="0.7"/>
  <circle cx="8"  cy="32" r="1.2" fill="#00E5C3" opacity="0.5"/>
  <circle cx="56" cy="32" r="1.2" fill="#6C63FF" opacity="0.5"/>
</svg>
